services:
  db:
    image: mysql:8.0
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci", "--skip-character-set-client-handshake"]
    environment:
      MYSQL_ROOT_PASSWORD: 123taolaai
      MYSQL_DATABASE: finance_app
      MYSQL_INITDB_SKIP_TZINFO: yes
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init_SQL/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./BE
    restart: unless-stopped
    env_file:
      - ./BE/.env
    environment:
      DATABASE_URL: mysql+pymysql://root:123taolaai@db:3306/finance_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./BE/src:/app/src

  frontend:
    build: ./FE
    env_file:
      - ./FE/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./FE/src:/app/src

volumes:
  db_data:
